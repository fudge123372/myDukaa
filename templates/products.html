{% extends 'base.html' %}
{% block title %} Products {% endblock %}

{% block content %}

<div class="container mt-4">

    <!-- HEADER SECTION -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">🛒 Products</h3>

        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exampleModal">
            + Add Product
        </button>
    </div>

    <!-- TABLE CARD -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <table id="example" class="table table-hover table-bordered align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Buying Price</th>
                        <th>Selling Price</th>
                    </tr>
                </thead>

                <tbody>
                    {% for product in products_data %}
                    <tr>
                        <td>{{ product[0] }}</td>
                        <td class="fw-semibold">{{ product[1] }}</td>
                        <td>KES {{ product[2] }}</td>
                        <td class="text-success fw-bold">KES {{ product[3] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="exampleModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content shadow">

            <!-- HEADER -->
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Add Product</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <!-- FORM -->
            <form method="post" action="/add_product">

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="p_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Buying Price</label>
                        <input type="number" name="b_price" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Selling Price</label>
                        <input type="number" name="s_price" class="form-control" required>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success">Save Product</button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
