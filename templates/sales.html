
{% extends 'base.html' %}
{% block title %} Sales {% endblock %}

{% block content %}

<div class="container mt-4">

    <!-- HEADER SECTION -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">📊 Sales</h3>

        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
            + Add Sale
        </button>
    </div>

    <!-- TABLE CARD -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <table id="example" class="table table-hover table-bordered align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>Sales ID</th>
                        <th>Product ID</th>
                        <th>Quantity</th>
                        <th>Created At</th>
                    </tr>
                </thead>

                <tbody>
                    {% for sale in sales_data %}
                    <tr>
                        <td>{{ sale[0] }}</td>
                        <td>{{ sale[1] }}</td>
                        <td class="fw-semibold">{{ sale[2] }}</td>
                        <td>{{ sale[3] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="exampleModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content shadow">

            <!-- HEADER -->
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Add Sale</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <!-- FORM -->
            <form method="post" action="/add_sale">

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Product ID</label>
                        <input type="number" name="pid" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" required>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save Sale</button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
